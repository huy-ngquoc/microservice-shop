            - DISCOVERY_SERVER_URL=${DISCOVERY_SERVER_URL}
            - REDIS_HOST=${REDIS_HOST}
            - CART_MONGODB_URL=${CART_MONGODB_URL}
            - KAFKA_URL=${KAFKA_URL}
        deploy:
            resources:
                limits:
                    memory: 512M
                reservations:
                    memory: 256M
    inventory-service:
