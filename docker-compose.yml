services:
    # Build-only image: pre-installs parent POM and all shared modules into ~/.m2
    # so domain services can use `FROM microservice-shop-shared-base AS build`.
    # Other services declare it via `additional_contexts: service:shared-base`,
    # which makes Compose build it first. The `entrypoint: ["true"]` causes the
    # container to exit immediately if `up` ever tries to start it.
    shared-base:
        image: microservice-shop-shared-base
        build:
            context: .
            dockerfile: backend/services/Dockerfile.shared-base
        entrypoint: [ "true" ]
        restart: "no"

    config-server:
        build:
            context: . # Trỏ về thư mục gốc chứa pom.xml tổng và common-dto
            dockerfile: backend/services/config-server/Dockerfile
            additional_contexts:
                microservice-shop-shared-base: "service:shared-base"
        container_name: config-server
        healthcheck:
            test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8888/actuator/health" ]
            interval: 10s
            timeout: 5s
            retries: 5
        ports:
            - "8888:8888"
        networks:
            - microservices-net
        volumes:
            - ./backend/services/config-server/src/main/resources/config:/app/config-repo
        environment:
            - CONFIG_SERVER_URL=${CONFIG_SERVER_URL}
            - DISCOVERY_SERVER_URL=${DISCOVERY_SERVER_URL}
            - KEYCLOAK_URL=${KEYCLOAK_URL}
            - KAFKA_URL=${KAFKA_URL}
            - ACCOUNT_DB_URL=${ACCOUNT_DB_URL}
        deploy:
            resources:
                limits:
                    memory: 384M
                reservations:
                    memory: 256M
    discovery-server:
        build:
            context: .
            dockerfile: backend/services/discovery-server/Dockerfile
            additional_contexts:
                microservice-shop-shared-base: "service:shared-base"
        container_name: discovery-server
        ports:
            - "8761:8761"
        depends_on:
            config-server:
                condition: service_healthy
        healthcheck:
            test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health" ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s
        networks:
            - microservices-net
        environment:
            - CONFIG_SERVER_URL=${CONFIG_SERVER_URL}
        deploy:
            resources:
                limits:
                    memory: 384M
                reservations:
                    memory: 256M
    account-service:
        build:
            context: .
            dockerfile: backend/services/account-service/account/Dockerfile
            additional_contexts:
                microservice-shop-shared-base: "service:shared-base"
        container_name: account-service
        ports:
            - "8071:8071"
        depends_on:
            config-server:
                condition: service_healthy
            discovery-server:
                condition: service_healthy
        networks:
            - microservices-net
        environment:
            - CONFIG_SERVER_URL=${CONFIG_SERVER_URL}
            - DISCOVERY_SERVER_URL=${DISCOVERY_SERVER_URL}
            - KEYCLOAK_URL=${KEYCLOAK_URL}
            - KAFKA_URL=${KAFKA_URL}
            - ACCOUNT_DB_URL=${ACCOUNT_DB_URL}
        deploy:
            resources:
                limits:
                    memory: 512M
                reservations:
                    memory: 256M
    auth-service:
        build:
            context: .
            dockerfile: backend/services/auth-service/auth/Dockerfile
            additional_contexts:
                microservice-shop-shared-base: "service:shared-base"
        container_name: auth-service
        ports:
            - "8082:8082"
        depends_on:
            config-server:
                condition: service_healthy
            discovery-server:
                condition: service_healthy
        networks:
            - microservices-net
        environment:
            - CONFIG_SERVER_URL=${CONFIG_SERVER_URL}
            - DISCOVERY_SERVER_URL=${DISCOVERY_SERVER_URL}
            - KEYCLOAK_URL=${KEYCLOAK_URL}
            - KAFKA_URL=${KAFKA_URL}
        deploy:
            resources:
                limits:
                    memory: 512M
                reservations:
                    memory: 256M
    cart-service:
        build:
            context: .
            dockerfile: backend/services/cart-service/cart/Dockerfile
            additional_contexts:
                microservice-shop-shared-base: "service:shared-base"
        container_name: cart-service
        ports:
            - "8089:8089"
        depends_on:
            config-server:
                condition: service_healthy
            discovery-server:
                condition: service_healthy
        networks:
