    order-service:
        build:
            context: .
            dockerfile: backend/services/order-service/order/Dockerfile
            additional_contexts:
                microservice-shop-shared-base: "service:shared-base"
        container_name: order-service
        ports:
            - "8000:8000"
        depends_on:
            config-server:
                condition: service_healthy
            discovery-server:
                condition: service_healthy
        networks:
            - microservices-net
        environment:
            - CONFIG_SERVER_URL=${CONFIG_SERVER_URL}
            - DISCOVERY_SERVER_URL=${DISCOVERY_SERVER_URL}
            - REDIS_ORDER_HOST=${REDIS_ORDER_HOST}
            - ORDER_DB_URL=${ORDER_DB_URL}
            - REDIS_PORT=${REDIS_PORT}
            - KAFKA_URL=${KAFKA_URL}
        deploy:
            resources:
                limits:
                    memory: 768M
                reservations:
                    memory: 384M
    fake-payment-service:
        build:
            context: .
            dockerfile: backend/services/fake-payment/payment/Dockerfile
            additional_contexts:
                microservice-shop-shared-base: "service:shared-base"
        container_name: payment-service
        ports:
            - "8074:8074"
        depends_on:
            config-server:
                condition: service_healthy
            discovery-server:
                condition: service_healthy
        networks:
            - microservices-net
        environment:
            - CONFIG_SERVER_URL=${CONFIG_SERVER_URL}
            - DISCOVERY_SERVER_URL=${DISCOVERY_SERVER_URL}
            - PAYMENT_DB_URL=${PAYMENT_DB_URL}
            - KAFKA_URL=${KAFKA_URL}
        deploy:
            resources:
                limits:
                    memory: 512M
                reservations:
                    memory: 256M
    product-service:
        build:
            context: .
            dockerfile: backend/services/product-service/Dockerfile
            additional_contexts:
                microservice-shop-shared-base: "service:shared-base"
        container_name: product-service
        ports:
            - "8070:8070"
        depends_on:
            config-server:
                condition: service_healthy
            discovery-server:
                condition: service_healthy
            mongo:
                condition: service_healthy
        networks:
            - microservices-net
        environment:
            - CONFIG_SERVER_URL=${CONFIG_SERVER_URL}
            - DISCOVERY_SERVER_URL=${DISCOVERY_SERVER_URL}
            - PRODUCT_DB_HOST=${PRODUCT_DB_HOST}
            - PRODUCT_DB_PORT=${PRODUCT_DB_PORT}
            - KAFKA_URL=${KAFKA_URL}
        deploy:
            resources:
                limits:
                    memory: 768M
                reservations:
                    memory: 384M
    postgresql:
        container_name: ms_pg_sql
        image: postgres:18
        environment:
            POSTGRES_USER: alibou
            POSTGRES_PASSWORD: alibou
            PGDATA: /data/postgres
            TZ: UTC
        volumes:
            - postgres:/data/postgres
        ports:
            - "5433:5432"
        networks:
            - microservices-net
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    memory: 256M
    postgresql_account:
        container_name: ms_pg_sql_account
        image: postgres:18
        environment:
            POSTGRES_USER: alibou
            POSTGRES_PASSWORD: alibou
            PGDATA: /data/postgres
            TZ: UTC
            POSTGRES_DB: account
        volumes:
            - postgres_account:/data/postgres
        ports:
            - "5434:5432"
        networks:
            - microservices-net
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    memory: 256M
    postgresql_inventory:
        container_name: ms_pg_sql_inventory
        image: postgres:18
        environment:
            POSTGRES_USER: alibou
            POSTGRES_PASSWORD: alibou
            PGDATA: /data/postgres
            TZ: UTC
            POSTGRES_DB: inventory
        volumes:
            - postgres_inventory:/data/postgres
        ports:
            - "5440:5432"
        networks:
            - microservices-net
        deploy:
            resources:
                limits:
                    memory: 256M
    postgresql_payment:
        container_name: ms_pg_sql_payment
        image: postgres:18
        environment:
            POSTGRES_USER: alibou
            POSTGRES_PASSWORD: alibou
            PGDATA: /data/postgres
            TZ: UTC
            POSTGRES_DB: payment
        volumes:
            - postgres_payment:/data/postgres
        ports:
            - "5435:5432"
        networks:
            - microservices-net
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    memory: 256M
    pgadmin:
        container_name: ms_pgadmin
        image: dpage/pgadmin4:9
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin4@pgadmin.org}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
            PGADMIN_CONFIG_SERVER_MODE: 'False'
            TZ: UTC
        volumes:
            - pgadmin:/var/lib/pgadmin
        ports:
            - "5050:80"
        networks:
            - microservices-net
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    memory: 256M

    zipkin:
        container_name: ms_zipkin
        image: openzipkin/zipkin:3
        environment:
            - TZ=UTC
        ports:
            - "9411:9411"
        networks:
            - microservices-net
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    memory: 256M

    mongo:
        container_name: ms_mongo_db
        build:
            context: ./backend/mongo
            dockerfile: Dockerfile
        image: mongo:8-rs
        ports:
            - 27017:27017
        volumes:
            - mongo:/data/db
        environment:
            - MONGO_INITDB_ROOT_USERNAME=alibou
            - MONGO_INITDB_ROOT_PASSWORD=alibou
            - TZ=UTC
        command:
            - "--replSet"
            - "rs0"
            - "--bind_ip_all"
            - "--keyFile"
            - "/etc/mongo/keyfile"
        networks:
            - microservices-net
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    memory: 512M
        healthcheck:
            test: |
                mongosh --quiet -u alibou -p alibou --authenticationDatabase admin --eval "
                try {
                    if (rs.status().ok) {
                        quit(0);
                    }
                }
                catch (e) {
                    rs.initiate({_id:'rs0', members:[{_id:0, host:'mongo:27017'}]}).ok
                }"
            interval: 10s
            timeout: 30s
            start_period: 30s
            retries: 30
    mongodb_cart:
        container_name: ms_mongo_db_cart
        image: mongo:8
        ports:
            - 27021:27017
        volumes:
            - mongo_cart:/data
        environment:
            - MONGO_INITDB_ROOT_USERNAME=alibou
            - MONGO_INITDB_ROOT_PASSWORD=alibou
            - TZ=UTC
        networks:
            - microservices-net
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    memory: 256M
    mongodb_notification:
        container_name: ms_mongo_db_notification
        image: mongo:8
        ports:
            - 27020:27017
        volumes:
            - mongo_notification:/data
        environment:
            - MONGO_INITDB_ROOT_USERNAME=alibou
            - MONGO_INITDB_ROOT_PASSWORD=alibou
            - TZ=UTC
        networks:
            - microservices-net
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    memory: 256M
    mongodb_rating:
        container_name: ms_mongo_db_rating
        image: mongo:8
        ports:
            - 27018:27017
        volumes:
            - mongo_rating:/data
        environment:
            - MONGO_INITDB_ROOT_USERNAME=alibou
            - MONGO_INITDB_ROOT_PASSWORD=alibou
            - TZ=UTC
        networks:
            - microservices-net
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    memory: 256M
    mongodb_order:
        container_name: ms_mongo_db_order
        image: mongo:8
        ports:
            - 27019:27017
        healthcheck:
            test: |
                mongosh --quiet -u alibou -p alibou --authenticationDatabase admin --eval "
                try {
                    if (rs.status().ok) {
                        quit(0); // Nếu đã ngon lành thì thoát 0 (Healthy)
                    }
                } catch (e) {
                    // Nếu chưa khởi tạo (lỗi), thì chạy lệnh initiate
                    rs.initiate({
                        _id: 'rs0',
                        members: [{ _id: 0, host: 'ms_mongo_db_order:27017' }]
                    }).ok ? quit(0) : quit(1);
                }"
            interval: 10s
            timeout: 10s
            retries: 5
            start_period: 20s
        volumes:
            - mongo_order:/data
            - ./mongodb.key:/data/configdb/mongodb.key
        environment:
            - MONGO_INITDB_ROOT_USERNAME=alibou
            - MONGO_INITDB_ROOT_PASSWORD=alibou
            - TZ=UTC
        command: mongod --replSet rs0 --keyFile /data/configdb/mongodb.key --bind_ip_all
        entrypoint: [ "/bin/sh", "-c", "chown 999:999 /data/configdb/mongodb.key && chmod 400 /data/configdb/mongodb.key && exec docker-entrypoint.sh $$@" ]
        networks:
            - microservices-net
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    memory: 512M

    mongo-express:
        container_name: ms_mongo_express
        image: mongo-express:1
        restart: unless-stopped
        ports:
            - 8081:8081
        environment:
            - ME_CONFIG_MONGODB_ADMINUSERNAME=alibou
            - ME_CONFIG_MONGODB_ADMINPASSWORD=alibou
            - ME_CONFIG_MONGODB_SERVER=mongo
        networks:
            - microservices-net
        deploy:
            resources:
                limits:
                    memory: 128M

    redis:
        container_name: ms_redis
        image: redis:8.6
        restart: unless-stopped
        ports:
            - "6379:6379"
        environment:
            - TZ=UTC
        command:
            - "--maxmemory"
            - "256mb"
            - "--maxmemory-policy"
            - "allkeys-lfu"
        networks:
            - microservices-net
        deploy:
            resources:
                limits:
                    memory: 300M
        healthcheck:
            test: [ "CMD", "redis-cli", "ping" ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 5s

    # zookeeper:
    #     container_name: ms_zookeeper
    #     image: confluentinc/cp-zookeeper:8.1.2
    #     environment:
    #         ZOOKEEPER_SERVER_ID: 1
    #         ZOOKEEPER_CLIENT_PORT: 2181
    #         ZOOKEEPER_TICK_TIME: 2000
    #     ports:
    #         - "22181:2181"
    #     networks:
    #         - microservices-net

    kafka:
        container_name: ms_kafka
        image: confluentinc/cp-kafka:8.1.2
        ports:
            - "9092:9092"
            - "29092:29092"
        environment:
            # --- KRaft Specific Settings ---
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: 'broker,controller'
            KAFKA_CONTROLLER_QUORUM_VOTERS: '1@ms_kafka:9093'
            KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
            # Cluster ID is required for KRaft (You can change this later)
            CLUSTER_ID: 'MkU3MTAzOTpDRjQxNTY5OTo='

            # --- Listeners Configuration ---
            KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092'
            KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://ms_kafka:9092,PLAINTEXT_HOST://localhost:29092'
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
            KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'

            # --- Other Settings ---
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            TZ: UTC
            KAFKA_HEAP_OPTS: "-Xmx512m -Xms512m"
        networks:
            - microservices-net
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    memory: 1G

    mail-dev:
        container_name: ms_mail_dev
        image: maildev/maildev:latest
        ports:
            - 1080:1080
            - 1025:1025
        networks:
            - microservices-net
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    memory: 128M
    keycloak:
        container_name: ms_keycloak
        image: quay.io/keycloak/keycloak:26.5
        ports:
            - 9098:8080
        environment:
            - KEYCLOAK_ADMIN=admin
            - KEYCLOAK_ADMIN_PASSWORD=admin
            - JAVA_OPTS_APPEND=-Xmx384m -Xms256m
        networks:
            - microservices-net
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    memory: 512M
        command:
            - "start-dev"
    redis_order:
        image: redis:7.2-alpine
        container_name: redis_order
        restart: unless-stopped
        ports:
            - "6380:6379"
        command: redis-server --save 300 10 --requirepass binh123 --appendonly yes --appendfsync everysec --loglevel warning
        volumes:
            - redis_order:/data
        networks:
            - microservices-net
        deploy:
            resources:
                limits:
                    cpus: '0.50'
                    memory: 512M
        healthcheck:
            test: [ "CMD", "redis-cli", "-a", "binh123", "ping" ]
            interval: 10s
            timeout: 5s
            retries: 5
    redis_inventory:
        image: redis:7.2-alpine
        container_name: redis_inventory
        restart: unless-stopped
        ports:
            - "6381:6379"
        command: redis-server --save 300 10 --requirepass binh123 --appendonly yes --appendfsync everysec --loglevel warning
        volumes:
            - redis_inventory:/data
        networks:
            - microservices-net
        deploy:
            resources:
                limits:
                    cpus: '0.50'
                    memory: 512M
        healthcheck:
            test: [ "CMD", "redis-cli", "-a", "binh123", "ping" ]
            interval: 10s
            timeout: 5s
            retries: 5

    redis_cart:
        image: redis:7.2-alpine
        container_name: redis_cart
        restart: unless-stopped
        ports:
            - "6382:6379"
        command: redis-server --save 300 10 --requirepass binh123 --appendonly yes --appendfsync everysec --loglevel warning
        volumes:
            - redis_cart:/data
        networks:
            - microservices-net
        deploy:
            resources:
                limits:
                    cpus: '0.50'
                    memory: 512M
        healthcheck:
            test: [ "CMD", "redis-cli", "-a", "binh123", "ping" ]
            interval: 10s
            timeout: 5s
            retries: 5

networks:
    microservices-net:
        driver: bridge

volumes:
    postgres:
    postgres_account:
    pgadmin:
    mongo:
    mongo_rating:
    postgres_payment:
    mongo_order:
    postgres_inventory:
    mongo_auth:
    mongo_account:
    mongo_inventory:
    mongo_payment:
    mongo_notification:
    redis_cart:
    redis_order:
    redis_inventory:
    mongo_cart:
