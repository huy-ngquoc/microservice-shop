services:
    postgresql:
        container_name: ms_pg_sql
        image: postgres:18
        environment:
            POSTGRES_USER: alibou
            POSTGRES_PASSWORD: alibou
            PGDATA: /data/postgres
            TZ: UTC
        volumes:
            - postgres:/data/postgres
        ports:
            - "5432:5432"
        networks:
            - microservices-net
        restart: unless-stopped

    pgadmin:
        container_name: ms_pgadmin
        image: dpage/pgadmin4:9
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin4@pgadmin.org}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
            PGADMIN_CONFIG_SERVER_MODE: 'False'
            TZ: UTC
        volumes:
            - pgadmin:/var/lib/pgadmin
        ports:
            - "5050:80"
        networks:
            - microservices-net
        restart: unless-stopped

    zipkin:
        container_name: ms_zipkin
        image: openzipkin/zipkin:3
        environment:
            - TZ=UTC
        ports:
            - "9411:9411"
        networks:
            - microservices-net

    mongo:
        container_name: ms_mongo_db
        build:
            context: ./mongo
            dockerfile: Dockerfile
        image: mongo:8-rs
        ports:
            - 27017:27017
        volumes:
            - mongo:/data/db
        environment:
            - MONGO_INITDB_ROOT_USERNAME=alibou
            - MONGO_INITDB_ROOT_PASSWORD=alibou
            - TZ=UTC
        command:
            - "--replSet"
            - "rs0"
            - "--bind_ip_all"
            - "--keyFile"
            - "/etc/mongo/keyfile"
        networks:
            - microservices-net
        healthcheck:
            test: |
                mongosh --quiet -u alibou -p alibou --authenticationDatabase admin --eval "
                try {
                    if (rs.status().ok) {
                        quit(0);
                    }
                }
                catch (e) {
                    rs.initiate({_id:'rs0', members:[{_id:0, host:'mongo:27017'}]}).ok
                }"
            interval: 10s
            timeout: 30s
            start_period: 30s
            retries: 30

    mongo-express:
        container_name: ms_mongo_express
        image: mongo-express:1
        restart: unless-stopped
        ports:
            - 8081:8081
        environment:
            - ME_CONFIG_MONGODB_ADMINUSERNAME=alibou
            - ME_CONFIG_MONGODB_ADMINPASSWORD=alibou
            - ME_CONFIG_MONGODB_SERVER=mongo
        networks:
            - microservices-net

    redis:
        container_name: ms_redis
        image: redis:8.6
        restart: unless-stopped
        ports:
            - "6379:6379"
        environment:
            - TZ=UTC
        command:
            - "--maxmemory"
            - "256mb"
            - "--maxmemory-policy"
            - "allkeys-lfu"
        networks:
            - microservices-net
        healthcheck:
            test: [ "CMD", "redis-cli", "ping" ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 5s

    # zookeeper:
    #     container_name: ms_zookeeper
    #     image: confluentinc/cp-zookeeper:8.1.2
    #     environment:
    #         ZOOKEEPER_SERVER_ID: 1
    #         ZOOKEEPER_CLIENT_PORT: 2181
    #         ZOOKEEPER_TICK_TIME: 2000
    #     ports:
    #         - "22181:2181"
    #     networks:
    #         - microservices-net

    kafka:
        container_name: ms_kafka
        image: confluentinc/cp-kafka:8.1.2
        ports:
            - "9092:9092"
        environment:
            # --- KRaft Specific Settings ---
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: 'broker,controller'
            KAFKA_CONTROLLER_QUORUM_VOTERS: '1@ms_kafka:9093'
            KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
            # Cluster ID is required for KRaft (You can change this later)
            CLUSTER_ID: 'MkU3MTAzOTpDRjQxNTY5OTo='

            # --- Listeners Configuration ---
            KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092'
            KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://ms_kafka:29092,PLAINTEXT_HOST://localhost:9092'
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
            KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'

            # --- Other Settings ---
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            TZ: UTC
        networks:
            - microservices-net

    mail-dev:
        container_name: ms_mail_dev
        image: maildev/maildev:latest
        ports:
            - 1080:1080
            - 1025:1025
        networks:
            - microservices-net

    keycloak:
        container_name: ms_keycloak
        image: quay.io/keycloak/keycloak:26.5
        ports:
            - 9098:8080
        environment:
            - KEYCLOAK_ADMIN=admin
            - KEYCLOAK_ADMIN_PASSWORD=admin
        networks:
            - microservices-net
        command:
            - "start-dev"

networks:
    microservices-net:
        driver: bridge

volumes:
    postgres:
    pgadmin:
    mongo:
