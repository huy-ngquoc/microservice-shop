<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        .container { font-family: Arial, sans-serif; max-width: 600px; margin: auto; border: 1px solid #ddd; padding: 20px; }
        .header { background-color: #333; color: #fff; text-align: center; padding: 10px; }
        .table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .table th, .table td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; }
        .total-section { margin-top: 20px; text-align: right; line-height: 1.6; }
        .currency { color: #e44d26; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Cảm ơn bạn đã đặt hàng tại MSShop!</h2>
        </div>
        <p>Xin chào,</p>
        <p>Đơn hàng **#[[${order.orderId}]]** của bạn đã được tiếp nhận và đang trong quá trình xử lý.</p>

        <table class="table">
            <thead>
                <tr>
                    <th>Sản phẩm</th>
                    <th>SL</th>
                    <th>Đơn giá</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${order.orderDetailDocuments}">
                    <td th:text="${item.productName}">Tên SP</td>
                    <td th:text="${item.amount}">1</td>
                    <td class="currency" th:text="${#numbers.formatDecimal(item.unitPrice, 0, 'COMMA', 0, 'POINT')} + ' ' + ${order.orderCurrency}">0 VND</td>
                </tr>
            </tbody>
        </table>

        <div class="total-section">
            <p>Tạm tính: <span th:text="${#numbers.formatDecimal(order.orderOriginValue, 0, 'COMMA', 0, 'POINT')} + ' ' + ${order.orderCurrency}"></span></p>
            <p>Giảm giá: -<span th:text="${#numbers.formatDecimal(order.orderDiscount, 0, 'COMMA', 0, 'POINT')} + ' ' + ${order.orderCurrency}"></span></p>
            <hr>
            <h3>Tổng thanh toán: <span class="currency" th:text="${#numbers.formatDecimal(order.orderTotalPrice, 0, 'COMMA', 0, 'POINT')} + ' ' + ${order.orderCurrency}"></span></h3>
        </div>
    </div>
</body>
</html>
