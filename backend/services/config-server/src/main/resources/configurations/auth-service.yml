spring:
    security: 
        oauth2:
            resourceserver:
                jwt:
                    issuer-uri: http://localhost:9098/realms/ms_shop
                    jwk-set-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs
    kafka:
        producer:
            bootstrap-servers: localhost:9092
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
            properties:
                spring.json.type.mapping: AccountCreated:vn.uit.edu.msshop.auth.domain.event.AccountCreated
        consumer:
            group-id: account-group
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
            properties:
                spring.json.trusted.packages: "*"
                spring.json.type.mapping: AccountId:vn.uit.edu.msshop.auth.domain.event.AccountId
    cloud:
        gateway:
            server:
                webflux:
                    discovery:
                        locator:
                            enabled: true
                    routes:
                      - id: payment-service
                        uri: lb:http://PAYMENT-SERVICE
                        predicates:
                        - Path=/payment/**
management:
  endpoints:
    web:
      exposure:
        include: gateway, health, info
  endpoint:
    gateway:
      enabled: true
server:
    port: 8082
jwt:
    auth:
        converter:
            resource-id: ms_shop_rest_api
            principle-attribute: preferred_username
app:
    keycloak:
        admin:
            server-url: http://localhost:9098
            realm: ms_shop
            client-id: ms_shop_rest_api
            client-secret: CUKAVq8UFZ8gxav1JyfeT69WaEO5zekG
logging:
  level:
    org.apache.kafka: ERROR
    org.springframework.kafka: ERROR