spring:
    security: 
        oauth2:
            resourceserver:
                jwt:
                    issuer-uri: http://${KEYCLOAK_URL:localhost:8080}/realms/ms_shop
                    jwk-set-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs
    cloud:
        loadbalancer:
            clients: 
                retry: 
                    enabled: false
        gateway:
            discovery:
                locator:
                    enabled: true
            loadbalancer:
                cache:
                    ttl: 5s  
            server:
                webflux:
                    discovery:
                        locator:
                            enabled: true
                    routes:
                      - id: account-service
                        uri: lb://ACCOUNT-SERVICE
                        predicates:
                        - Path=/account/**
                      - id: payment-service
                        uri: lb://PAYMENT-SERVICE
                        predicates:
                        - Path=/payment/**
                      - id: cart-service
                        uri: lb://CART-SERVICE
                        predicates:
                        - Path=/cart/**
                      - id: order-service
                        uri: lb://ORDER-SERVICE
                        predicates:
                        - Path=/order/**
                      - id: inventory-service
                        uri: lb://INVENTORY-SERVICE
                        predicates:
                        - Path=/inventory/**
                      - id: recommendation-service
                        uri: lb://RECOMMENDATION-SERVICE
                        predicates:
                        - Path=/recommendation/**
                      - id: product-service
                        uri: lb://PRODUCT-SERVICE
                        predicates:
                        - Path=/products/**,/variants/**
                      
                        

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
logging:
  level:
    "[io.micrometer.tracing]": WARN
    "[io.zipkin.reporter2]": WARN
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
server:
    port: 8082
jwt:
    auth:
        converter:
            resource-id: ms_shop_rest_api
            principle-attribute: preferred_username
app:
    observability:
        tracing:
            service-name: ${spring.application.name}
            sampling-probability: 0.1
            zipkin-endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
    keycloak:
        admin:
            server-url: http://${KEYCLOAK_URL:localhost:8080}
            realm: ms_shop
            client-id: ms_shop_rest_api
            client-secret: VoU1JAQHpPCrEbUsaJUEeugfbx1qxhDU
eureka:
    client:
        serviceUrl:
            defaultZone: ${DISCOVERY_SERVER_URL:http://localhost:8761/eureka/}
    instance:
        lease-renewal-interval-in-seconds: 5 
        lease-expiration-duration-in-seconds: 10