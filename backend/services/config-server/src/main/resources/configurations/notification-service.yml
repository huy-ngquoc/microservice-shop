spring:
  kafka:
    bootstrap-servers: ${KAFKA_URL:localhost:9092}
    consumer:
      group-id: notification-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      max.poll.interval.ms: 300000
      max.poll.records: 1
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: java.lang.Object
        spring.json.type.mapping: 
          OrderCreated:vn.uit.edu.msshop.notification.domain.event.OrderCreated,
          OrderUpdatedEvent:vn.uit.edu.msshop.notification.domain.event.OrderUpdatedEvent,
          PaymentLinkCreated:vn.uit.edu.msshop.notification.domain.event.PaymentLinkCreated,
          OnlinePaymentSuccess:vn.uit.edu.msshop.notification.domain.event.OnlinePaymentSuccess,
          OnlinePaymentExpired:vn.uit.edu.msshop.notification.domain.event.OnlinePaymentExpired,
          OnlinePaymentCancelled:java.lang.Object,
          CodPaymentCreated:java.lang.Object,
          PaymentSuccess:java.lang.Object
  mongodb:
    uri: mongodb://alibou:alibou@${NOTIFICATION_DB_URL:localhost:27020}/notification_db?authSource=admin&uuidRepresentation=STANDARD&maxPoolSize=200&minPoolSize=20
  mail:
    host: smtp.gmail.com
    port: 587
    username: 
    password: 
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true 
            required: true
        debug: false
server:
  port: 8092
eureka:
    client:
        serviceUrl:
            defaultZone: ${DISCOVERY_SERVER_URL:http://localhost:8761/eureka/}
    instance:
        prefer-ip-address: true
        lease-renewal-interval-in-seconds: 5
        lease-expiration-duration-in-seconds: 10

logging:
  level:
    "[io.micrometer.tracing]": WARN
    "[io.zipkin.reporter2]": WARN
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

management:
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    tags:
      application: ${spring.application.name}

app:
  observability:
    tracing:
      service-name: ${spring.application.name}
      sampling-probability: 0.1
      zipkin-endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
