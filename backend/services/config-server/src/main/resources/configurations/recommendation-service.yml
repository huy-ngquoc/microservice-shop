server:
    port: 8080
feign:
  client:
    config:
      default: #ML-Service
        connectTimeout: 5000
        readTimeout: 600000
eureka:
    client:
        serviceUrl:
            defaultZone: ${DISCOVERY_SERVER_URL:http://localhost:8761/eureka/}
    instance:
        prefer-ip-address: true
        lease-renewal-interval-in-seconds: 5 
        lease-expiration-duration-in-seconds: 10