spring:
    data:
        mongodb:
            uri: mongodb://alibou:alibou@${RATING_DB_URL:localhost:27018}/rating_db?authSource=admin&uuidRepresentation=STANDARD
    kafka:
        bootstrap-servers: ${KAFKA_URL:localhost:9092}
        consumer:
            group-id: rating-service-group
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
            properties:
                "[spring.json.trusted.packages]": "*"
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
            properties:
                "[spring.json.type.mapping]": >-
                    RatingCreatedIntegrationEvent:vn.uit.edu.msshop.rating.application.dto.integration.RatingCreatedIntegrationEvent,
                    RatingUpdatedIntegrationEvent:vn.uit.edu.msshop.rating.application.dto.integration.RatingUpdatedIntegrationEvent,
                    RatingDeletedIntegrationEvent:vn.uit.edu.msshop.rating.application.dto.integration.RatingDeletedIntegrationEvent
cloudinary:
    cloud-name:
    api-key:
    api-secret:
server:
    port: 8072
eureka:
    client:
        serviceUrl:
            defaultZone: ${DISCOVERY_SERVER_URL:http://localhost:8761/eureka/}
    instance:
        prefer-ip-address: true
        lease-renewal-interval-in-seconds: 5
        lease-expiration-duration-in-seconds: 10

logging:
    level:
        "[io.micrometer.tracing]": WARN
        "[io.zipkin.reporter2]": WARN
    pattern:
        level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

management:
    endpoints:
        web:
            exposure:
                include: "*"
    metrics:
        tags:
            application: ${spring.application.name}

app:
    observability:
        tracing:
            service-name: ${spring.application.name}
            sampling-probability: 0.1
            zipkin-endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
