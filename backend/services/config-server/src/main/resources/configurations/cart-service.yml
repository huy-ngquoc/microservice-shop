server:
    port: 8089
spring:
  mongodb:
    uri: mongodb://alibou:alibou@${CART_MONGODB_URL:localhost:27021}/cart_db?authSource=admin&uuidRepresentation=STANDARD&maxPoolSize=200&minPoolSize=20
  data:
    redis:
      host: ${REDIS_HOST:localhost}       
      port: 6379
      password: binh123
      timeout: 60000        
      lettuce:
        pool:
          max-active: 8
  kafka:
        bootstrap-servers: ${KAFKA_URL:localhost:9092} 
        consumer:
            group-id: order-group
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
            properties:
                spring.json.trusted.packages: "*"
                spring.json.type.mapping: 
                    OrderCreatedSuccess:vn.uit.edu.msshop.cart.domain.event.OrderCreatedSuccess,
                    ProductUpdated:vn.uit.edu.msshop.cart.domain.event.ProductUpdated,
                    ProductDeleted:vn.uit.edu.msshop.cart.domain.event.ProductDeleted
eureka:
    client:
        serviceUrl:
            defaultZone: ${DISCOVERY_SERVER_URL:http://localhost:8761/eureka/}
    instance:
        prefer-ip-address: true
        lease-renewal-interval-in-seconds: 5 
        lease-expiration-duration-in-seconds: 10
                    
       