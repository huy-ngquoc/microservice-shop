server:
    port: 8070

spring:
    output:
        ansi:
            enabled: ALWAYS
    mongodb:
        host: ${PRODUCT_DB_HOST:localhost}
        port: ${PRODUCT_DB_PORT:27017}
        database: product
        username: alibou
        password: alibou
        authentication-database: admin
        representation:
            uuid: STANDARD 
    servlet:
        multipart:
            max-file-size: 5MB
            max-request-size: 6MB
    kafka:
        bootstrap-servers: ${KAFKA_URL:localhost:9092}
        consumer:
            group-id: product-service-group
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
            properties:
                "[spring.json.trusted.packages]": "*"
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
            properties:
                "[spring.json.type.mapping]": >
                    VariantUpdatedIntegrationEvent:vn.edu.uit.msshop.product.variant.application.dto.integration.VariantUpdatedIntegrationEvent,
                    VariantSoftDeletedIntegrationEvent:vn.edu.uit.msshop.product.variant.application.dto.integration.VariantSoftDeletedIntegrationEvent
    cloud:
        openfeign:
            client:
                config:
                    order-service:
                        connect-timeout: 3000
                        read-timeout: 10000
    task:
        scheduling:
            pool:
                size: 1

logging:
    level:
        "[vn.edu.uit.msshop]": DEBUG
        org:
            springframework:
                data:
                    mongodb:
                        core:
                            MongoTemplate: DEBUG
eureka:
    client:
        serviceUrl:
            defaultZone: ${DISCOVERY_SERVER_URL:http://localhost:8761/eureka/}
    instance:
        prefer-ip-address: true
        lease-renewal-interval-in-seconds: 5 
        lease-expiration-duration-in-seconds: 10