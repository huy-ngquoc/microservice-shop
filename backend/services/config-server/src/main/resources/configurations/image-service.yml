cloudinary:
  cloud-name: 
  api-key: 
  api-secret: 
server:
    port: 8073
logging:
  level:
    org.apache.kafka: ERROR
    org.springframework.kafka: ERROR
spring:
  kafka:
        producer:
            bootstrap-servers: localhost:9092
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
            properties:
                spring.json.type.mapping: 
                  ImageRemoveSuccess:vn.uit.edu.msshop.image.domain.event.ImageRemoveSuccess,
                  ImageDeleted:import vn.uit.edu.msshop.image.domain.event.ImageDeleted

        consumer:
            group-id: account-group
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
            properties:
                spring.json.trusted.packages: "*"
                spring.json.type.mapping: 
                  AvatarImageEvent:vn.uit.edu.msshop.image.domain.event.AvatarImageEvent,
                  ProductImageEvent:vn.uit.edu.msshop.image.domain.event.ProductImageEvent,
                  VariantImageEvent:vn.uit.edu.msshop.image.domain.event.VariantImageEvent