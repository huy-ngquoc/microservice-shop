cloudinary:
    cloud-name: ddouspryd
    api-key: 183591468263317 
    api-secret: CVkyDeKCXswJyFn_aAwcFN5W624
server:
    port: 8073
logging:
    level:
        org.apache.kafka: ERROR
        org.springframework.kafka: ERROR
        "[io.micrometer.tracing]": WARN
        "[io.zipkin.reporter2]": WARN
    pattern:
        level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
management:
    endpoints:
        web:
            exposure:
                include: "*"
    metrics:
        tags:
            application: ${spring.application.name}
app:
    observability:
        tracing:
            service-name: ${spring.application.name}
            sampling-probability: 0.1
            zipkin-endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
spring:
    kafka:
        producer:
            bootstrap-servers: localhost:9092
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
            properties:
                spring.json.type.mapping: 
                    ImageRemoveSuccess:vn.uit.edu.msshop.image.domain.event.ImageRemoveSuccess

        consumer:
            group-id: account-group
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
            properties:
                spring.json.trusted.packages: "*"
                spring.json.type.mapping: 
                    DeleteOldImageEvent:vn.uit.edu.msshop.image.domain.event.DeleteOldImageEvent,
                    RollbackImageEvent:vn.uit.edu.msshop.image.domain.event.RollbackImageEvent