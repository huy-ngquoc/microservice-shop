# CRUD Stress Test - HEAVY Config
# Target: ~500+ req/s (find breaking point)
# WARNING: May cause high CPU/memory usage
# Only run after medium test passes with good metrics

# Connection
host=localhost
product.port=8070

# Duration (seconds)
duration=300

# Thread Groups (total: 80 users)
writers=15
readers=50
updaters=10
deleters=5

# Throughput control (requests per minute)
createRate=420

# Expected metrics:
# - Throughput: 500-600 req/s
# - Response time p95: <500ms
# - Error rate: <1%

# If error rate > 1% or p95 > 500ms, reduce threads
