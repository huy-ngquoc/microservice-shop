# CRUD Stress Test - LIGHT Config
# Target: ~200-300 req/s (safe for laptop)
# Use this first to warm up the system

# Connection
host=localhost
port=8070

# Duration (seconds)
duration=120

# Thread Groups (total: 25 users)
writers=5
readers=15
updaters=3
deleters=2

# Throughput control (requests per minute)
createRate=120

# Expected metrics:
# - Throughput: 200-300 req/s
# - Response time p95: <300ms
# - Error rate: <0.5%
